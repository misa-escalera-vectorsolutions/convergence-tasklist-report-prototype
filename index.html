<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights — Tasklist Report | Convergence LMS</title>

<!-- Vector Web Components -->
<script type="module" src="https://cdn.vsp-prod.com/web-components/@vector-web-components/core/v1.19.0/core.iife.js"></script>
<script src="https://cdn.vsp-prod.com/web-components/@vector-web-components/themes/v1.5.0/styles.js"></script>
<link rel="stylesheet" href="https://cdn.vsp-prod.com/web-components/@vector-web-components/assets/v1.0.0/fonts/open-sans/v43/open-sans.css"/>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --banner-bg-top: #edf5ff;
  --banner-bg-bottom: #e4eefb;
  --topnav-active-bg: #d9f1df;
  --topnav-active-bg-hover: #c7e8cf;
  --topnav-active-ink: #185b33;
  --context-border: rgba(2,113,206,.12);
  --location-selection-bg: #dce9fb;
  --location-selection-bg-soft: #edf5ff;
  --location-selection-bg-pressed: #d6e5fb;
  --location-hover-bg: rgba(220,233,251,.52);
  --location-hover-ink: #2d405f;
  --location-control-ink: #4a5568;
  --focus-ring: 0 0 0 3px rgba(2,113,206,.28);

  /* report design tokens */
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-light: #eff6ff;
  --bg: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-hover: #f1f5f9;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --radius: 6px;
  --radius-sm: 4px;
  --passed-bg: #dcfce7; --passed-text: #15803d;
  --incomplete-bg: #f1f5f9; --incomplete-text: #475569;
  --not-started-bg: #f8fafc; --not-started-text: #64748b;
}

html { height: 100%; overflow: hidden; }

body {
  font-family: var(--lumo-font-family, 'Open Sans', sans-serif);
  font-size: 13px;
  color: var(--text-primary);
  background: #eef3f8;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── Top Nav ── */
vwc-topnav {
  position: sticky;
  top: 0;
  z-index: 100;
  border-top: 0 !important;
  box-shadow: var(--lumo-box-shadow-xs);
}
vwc-topnav::before { display: none !important; height: 0 !important; background: transparent !important; }
vwc-topnav::part(desktop-logo) { margin-inline-start: 16px; }

.topnav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}
.topnav-link {
  text-decoration: none;
  color: var(--lumo-secondary-text-color);
  font-weight: 700;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 999px;
  transition: background-color 160ms ease, color 160ms ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.topnav-link:hover { background: var(--lumo-primary-color-10pct); }
.topnav-link.active { color: var(--topnav-active-ink); background: var(--topnav-active-bg); }
.topnav-link.active:hover { background: var(--topnav-active-bg-hover); }
.topnav-beta {
  padding: 2px 6px;
  border-radius: 999px;
  background: #7c3aed;
  color: white;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
}

/* ── App Shell ── */
.app-shell {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* ── Location Picker Overlay ── */
.location-picker-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  background: rgba(238,243,248,.18);
  backdrop-filter: blur(10px) saturate(1.02);
  transition: opacity 320ms ease;
}
.app-shell.location-picker-open .location-picker-overlay {
  opacity: 1;
  pointer-events: auto;
}

/* ── Page Banner ── */
.page-banner {
  background: linear-gradient(180deg, var(--banner-bg-top) 0%, var(--banner-bg-bottom) 100%);
  border-bottom: 1px solid var(--context-border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 60;
  flex-shrink: 0;
}
.context-ribbon {
  flex: 1;
  min-width: 0;
  position: relative;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 8px 16px;
  border-radius: 18px;
  background: white;
  border: 1px solid var(--context-border);
  box-shadow: var(--lumo-box-shadow-xs, 0 1px 4px rgba(0,0,0,.1));
}

/* ── Location Chip ── */
.location-trigger-wrap {
  position: relative;
  display: inline-flex;
  align-items: flex-start;
  align-self: flex-start;
  flex-shrink: 0;
}
.location-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  border: 0;
  border-radius: 10px;
  background: #e5e7eb;
  padding: 8px 12px;
  color: #111827;
  font-weight: 700;
  font-size: 12.5px;
  font-family: inherit;
  cursor: pointer;
  transition: background 160ms ease;
  position: relative;
  z-index: 62;
  white-space: nowrap;
}
.location-chip:hover { background: #d1d5db; }
.location-chip i { font-size: 13px; color: var(--primary); }

/* ── Breadcrumb Trail ── */
.breadcrumb-trail {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding-left: 14px;
  line-height: 1.3;
}
.breadcrumb-segment {
  white-space: nowrap;
  font-weight: 600;
  font-size: 13px;
  color: var(--lumo-secondary-text-color, #6b7280);
  border: 0; padding: 2px 4px;
  background: transparent;
  font-family: inherit;
  cursor: pointer;
  border-radius: 6px;
  transition: color 160ms, background 160ms;
}
.breadcrumb-segment:hover { color: var(--text-primary); background: rgba(0,0,0,.04); }
.breadcrumb-current {
  font-weight: 700;
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
}
.breadcrumb-sep { color: var(--text-muted); font-size: 11px; }
.context-chevron { color: var(--text-muted); font-size: 10px; }
.banner-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.help-btn {
  width: 28px; height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 12px; font-weight: 700;
  cursor: pointer; background: white;
  box-shadow: var(--shadow-sm);
}

/* ── Location Picker Panel ── */
.location-picker-panel {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  z-index: 200;
  width: max-content;
  min-width: 320px;
  max-width: 400px;
  max-height: 500px;
  overflow: hidden;
  border-radius: 16px;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transform: translateY(-8px) scale(0.985);
  transform-origin: top left;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(22px) saturate(1.04);
  box-shadow: 0 8px 32px rgba(0,0,0,.16), 0 0 0 1px rgba(0,0,0,.06);
  transition: opacity 260ms ease, transform 420ms cubic-bezier(.22,1,.36,1), visibility 0s linear 420ms;
}
.location-picker-panel.is-open {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transform: translateY(0) scale(1);
  transition-delay: 0ms, 0ms, 0ms;
}
.location-picker-tree {
  display: grid;
  align-content: start;
  gap: 2px;
  padding: 8px;
  max-height: 500px;
  overflow-y: auto;
  opacity: 0;
  transition: opacity 280ms ease;
}
.location-picker-panel.is-open .location-picker-tree { opacity: 1; transition-delay: 220ms; }

/* Location nodes */
.location-node { display: grid; width: 100%; gap: 2px; grid-template-rows: auto 0fr; }
.location-node.expanded { grid-template-rows: auto 1fr; }
.location-children { display: grid; gap: 0; min-height: 0; overflow: hidden; }
.location-node-row {
  display: grid;
  grid-template-columns: 22px minmax(0,1fr) 18px;
  align-items: center;
  column-gap: 6px;
  min-height: 52px;
  border-radius: 12px;
  padding: 0 10px 0 calc(8px + (var(--location-depth,0) * 16px));
  position: relative;
  background: transparent;
  transition: background 160ms;
}
.location-node-row::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background: transparent;
  opacity: 0;
  transition: background 160ms, opacity 160ms;
  pointer-events: none;
}
.location-node-row > * { position: relative; z-index: 1; }
.location-node-row.selected::before { background: var(--location-selection-bg); opacity: 1; }
.location-node-row:not(.selected):hover::before { background: var(--location-hover-bg); opacity: 1; }

.location-toggle-button, .location-toggle-spacer {
  width: 22px; min-width: 22px; height: 52px;
  display: inline-grid; place-items: center;
  border: 0; background: transparent;
  color: var(--location-control-ink); cursor: pointer;
}
.location-toggle-spacer { cursor: default; }
.location-option-summary {
  min-height: 52px; border: 0; border-radius: 10px;
  background: transparent; color: var(--lumo-body-text-color, #0f172a);
  display: grid; align-content: center; justify-items: start;
  padding: 6px 8px; text-align: left; cursor: pointer;
  transition: background 160ms;
}
.location-option-copy { display: grid; gap: 2px; min-width: 0; }
.location-option-copy strong { font-size: 13px; font-weight: 700; line-height: 1.25; }
.location-option-copy span { color: #6b7280; font-size: 11.5px; line-height: 1.3; }
.location-option-check {
  width: 16px; color: var(--primary);
  grid-column: 3; justify-self: end; align-self: center;
  transition: opacity 160ms, transform 160ms;
}
.location-option-check.is-hidden { opacity: 0; transform: scale(.86); }
.location-option-chevron { width: 14px; }

/* ── Main Layout ── */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Side Nav ── */
/* ── Side Nav (vwc-sidenav) ── */
vwc-sidenav {
  --vwc-sidenav-offset: 0px;
  flex-shrink: 0;
  min-height: 0;
  align-self: stretch;
  /* Width managed entirely via inline style in JS: 250px expanded, auto when collapsed */
  position: relative !important;
  z-index: 1 !important;
}

/* ── Report Area ── */
.report-area { flex: 1; display: flex; overflow: hidden; }
.report-content { flex: 1; padding: 20px 24px; overflow: hidden; min-width: 0; display: flex; flex-direction: column; }

/* ── Report Header ── */
.report-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
.report-title h1 { font-size: 20px; font-weight: 700; letter-spacing: -.015em; }
.report-updated { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }
.report-actions-bar { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.report-actions-left { display: flex; gap: 6px; align-items: center; }
.report-actions-right { display: flex; gap: 6px; align-items: center; }

/* Size prefix icons inside vaadin-button to match Lumo icon-size-s (18px) */
vaadin-button vwc-icon[slot="prefix"] {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}



/* ── Section Header ── */
.section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
.section-title { font-size: 14px; font-weight: 700; }
.section-date {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: var(--primary); background: var(--primary-light);
  padding: 2px 8px; border-radius: 3px; margin-top: 3px; margin-bottom: 14px;
}

/* ── Grid ── */
.grid-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); flex: 1; min-height: 0; display: flex; flex-direction: column; }
.grid-scroll-wrap { overflow: auto; flex: 1; min-height: 0; }
.grid-table { width: 100%; min-width: max-content; border-collapse: collapse; }
.grid-table th {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg-secondary);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  color: var(--text-muted); padding: 9px 12px; text-align: left;
  border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none;
}
.grid-table th:hover { color: var(--text-secondary); }
.grid-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; font-size: 12.5px; }
.master-row { cursor: pointer; transition: background .1s; }
.master-row:hover > td { background: var(--bg-hover); }
.master-row.expanded { position: sticky; top: var(--master-row-top, 35px); z-index: 1; }
.master-row.expanded > td { background: var(--primary-light); border-bottom: 1px solid rgba(37,99,235,.18); }
.grid-table tr:last-child > td { border-bottom: none; }

.expand-btn {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); background: transparent;
  border: 1.5px solid var(--border); cursor: pointer; transition: all .15s;
}
.expand-btn:hover { border-color: var(--primary); color: var(--primary); }
.expand-btn.open { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.expand-btn i { font-size: 8px; transition: transform .2s; }
.expand-btn.open i { transform: rotate(90deg); }

.tasklist-name { font-weight: 600; line-height: 1.3; }
.tasklist-version { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.location-text { font-size: 11.5px; color: var(--text-secondary); line-height: 1.4; }
.progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 90px; }
.progress-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }
.progress-pct { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); min-width: 30px; text-align: right; }

.badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 3px;
  font-size: 11px; font-weight: 700; white-space: nowrap; letter-spacing: .02em;
}
.badge-passed { background: var(--passed-bg); color: var(--passed-text); }
.badge-incomplete { background: var(--incomplete-bg); color: var(--incomplete-text); }
.badge-not-started { background: var(--not-started-bg); color: var(--not-started-text); border: 1px solid var(--border); }
.badge-assigned { background: #f1f5f9; color: #475569; border: 1px solid var(--border); font-size: 10.5px; }
.badge-required { font-size: 10px; padding: 1px 5px; background: #fef3c7; color: #92400e; border-radius: 3px; font-weight: 700; margin-left: 6px; vertical-align: middle; }

/* ── Detail Row ── */
.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-cell { padding: 0 !important; background: #f8fafc !important; border-bottom: 2px solid var(--primary) !important; }
.detail-inner { padding: 16px 20px 20px 46px; }
.detail-meta-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
.detail-meta-items { display: flex; gap: 24px; flex-wrap: wrap; flex: 1; }
.detail-meta { font-size: 11.5px; color: var(--text-secondary); }

/* ── Signatures button ── */
/* Pagination */
.grid-pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg); }
.pag-info { font-size: 12px; color: var(--text-muted); }
.pag-controls { display: flex; gap: 4px; align-items: center; }
.pag-num { min-width: 32px; height: 32px; padding: 0 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-secondary); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .12s; }
.pag-num:hover { background: var(--bg-hover); border-color: #cbd5e1; color: var(--text-primary); }
.pag-num.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 700; }
.pag-nav { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-secondary); font-family: inherit; cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: center; }
.pag-nav:hover:not(:disabled) { background: var(--bg-hover); border-color: #cbd5e1; }
.pag-nav:disabled { opacity: .4; cursor: not-allowed; }

/* ── Signatures modal ── */
.sig-modal { width: 760px; max-width: 95vw; }
.sig-modal-subtitle { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
.sig-cards { display: flex; flex-wrap: wrap; gap: 14px; padding: 2px 0 4px; }
.sig-card {
  width: 140px; flex-shrink: 0;
  border: 1.5px solid var(--border); border-radius: 8px;
  overflow: hidden; background: var(--bg);
  box-shadow: var(--shadow-sm);
}
.sig-image-area {
  height: 88px; background: #f9fafb;
  border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: center;
  padding: 10px 12px;
}
.sig-image-area svg { width: 100%; height: 100%; overflow: visible; }
.sig-card-info { padding: 9px 11px 11px; }
.sig-card-name { font-size: 11.5px; font-weight: 700; color: var(--text-primary); margin-bottom: 5px; line-height: 1.3; }
.sig-card-role {
  display: inline-flex; align-items: center;
  font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  padding: 2px 6px; border-radius: 3px; margin-bottom: 6px;
}
.sig-role-instructor { background: var(--primary-light); color: var(--primary); }
.sig-role-employee { background: #dcfce7; color: #15803d; }
.sig-card-date { font-size: 10.5px; color: var(--text-muted); line-height: 1.4; }
.detail-meta strong { color: var(--text-primary); }

/* ── Inline Signatures Section ── */
.sig-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-light); }
.sig-section-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 10px; }
.sig-cards-inline { display: flex; flex-wrap: wrap; gap: 12px; }

.detail-grid { width: 100%; border-collapse: collapse; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.detail-grid th { position: static; z-index: auto; background: #eef2f7; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
.detail-grid td { padding: 9px 10px; border-bottom: 1px solid var(--border-light); vertical-align: top; font-size: 12px; line-height: 1.4; }
.detail-grid tr:last-child td { border-bottom: none; }
.detail-grid tr:hover td { background: var(--bg-hover); }
.task-num-cell { width: 30px; text-align: center; font-weight: 700; color: var(--text-muted); font-size: 11px; }
.task-desc-cell { max-width: 380px; }
.signoff-cell { min-width: 155px; white-space: nowrap; }
.signoff-name { font-weight: 600; }
.signoff-date { font-size: 11px; color: var(--text-muted); display: block; margin-top: 1px; }
.signoff-none { color: var(--text-muted); font-style: italic; font-size: 11px; }
.signoff-name-row { display: flex; align-items: center; gap: 5px; }
.signoff-overflow-chip {
  display: inline-flex; align-items: center;
  margin-left: 6px; padding: 1px 7px;
  background: var(--primary-light); color: var(--primary);
  border: 1px solid rgba(37,99,235,.2); border-radius: 10px;
  font-size: 10.5px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: background .12s; vertical-align: middle; line-height: 1.6;
}
.signoff-overflow-chip:hover { background: #dbeafe; }
.signoff-overflow-chip.active { background: #dbeafe; border-color: var(--primary); }

.signoff-popover {
  position: fixed; z-index: 600;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.14), 0 0 0 1px rgba(0,0,0,.04);
  min-width: 210px; max-width: 290px; padding: 4px 0;
  display: none;
}
.signoff-popover.open { display: block; }
.signoff-popover-header {
  padding: 7px 14px 6px; font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted);
  border-bottom: 1px solid var(--border-light);
}
.signoff-popover-item { padding: 8px 14px; border-bottom: 1px solid var(--border-light); }
.signoff-popover-item:last-child { border-bottom: none; }
.signoff-popover-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
.signoff-popover-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.comment-cell { max-width: 200px; font-size: 11.5px; color: var(--text-secondary); line-height: 1.4; }

/* ── Filter Panel ── */
.filter-panel-wrap { display: flex; flex-shrink: 0; position: relative; }
.filter-panel { width: 340px; flex-shrink: 0; background: var(--bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 220ms cubic-bezier(.4,0,.2,1); }
.filter-panel.collapsed { width: 0; border-left: none; }
.filter-reveal-btn {
  display: none;
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border: 1.5px solid var(--primary);
  border-radius: var(--radius);
  color: var(--primary);
  font-size: 16px;
  cursor: pointer;
  transition: background .12s, box-shadow .12s;
  box-shadow: 0 1px 4px rgba(37,99,235,.10);
}
.filter-reveal-btn:hover { background: var(--primary-light); box-shadow: 0 2px 8px rgba(37,99,235,.18); }
.filter-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; flex-shrink: 0; }
.filter-title { font-size: 14px; font-weight: 700; }
.filter-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 7px; }
.filter-date-row { display: flex; align-items: center; gap: 4px; }
.filter-date-input { flex: 1; min-width: 0; padding: 5px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 11px; color: var(--text-primary); background: var(--bg); font-family: inherit; transition: border-color .12s; }
.filter-date-input:focus { outline: none; border-color: var(--primary); }
.filter-date-sep { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.filter-select-btn { width: 100%; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-secondary); font-size: 12.5px; font-family: inherit; text-align: left; cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: space-between; }
.filter-select-btn:hover { border-color: var(--primary); color: var(--primary); }
.filter-checkboxes { display: flex; flex-direction: column; gap: 8px; }
.filter-checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; }
.filter-checkbox-row input { cursor: pointer; accent-color: var(--primary); width: 14px; height: 14px; }
.filter-radio-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; }
.filter-radio-row input { cursor: pointer; accent-color: var(--primary); width: 14px; height: 14px; }
.filter-divider { height: 1px; background: var(--border); }
.filter-footer { padding: 12px 16px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--bg); }
.filter-footer-btns { display: flex; gap: 8px; }
.filter-footer-btns vaadin-button { flex: 1; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg); border-radius: 10px; width: 420px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.18); overflow: hidden; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 14px; font-weight: 700; }
.modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
.modal-search { width: 100%; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 12.5px; font-family: inherit; margin-bottom: 12px; transition: border-color .12s; }
.modal-search:focus { outline: none; border-color: var(--primary); }
.modal-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; border-bottom: 1px solid var(--border-light); }
.modal-item:last-child { border-bottom: none; }
.modal-item:hover { color: var(--text-primary); }
.modal-item input { accent-color: var(--primary); }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

.icon-btn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; background: transparent; border: none; font-size: 14px; transition: background .12s; }
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ── Column Filter Header ── */
.th-inner { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.th-label { flex: 1; min-width: 0; }
.col-filter-btn {
  width: 16px; height: 16px; border: none; background: transparent; padding: 0;
  color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center;
  justify-content: center; border-radius: 2px; font-size: 8px; font-family: inherit;
  opacity: 0; flex-shrink: 0; transition: opacity .12s, color .12s;
}
th:hover .col-filter-btn { opacity: .55; }
.col-filter-btn.active, th:hover .col-filter-btn.active { opacity: 1; color: var(--primary); }
.col-filter-btn:hover { opacity: 1 !important; color: var(--primary); }

/* ── Column Filter Popover ── */
.col-filter-popover {
  position: fixed; z-index: 500;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.14), 0 0 0 1px rgba(0,0,0,.04);

}
.col-filter-popover.open { display: block; }
.col-filter-popover-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; }
.col-filter-input { width: 100%; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; color: var(--text-primary); box-sizing: border-box; }
.col-filter-input:focus { outline: none; border-color: var(--primary); }
.col-filter-check-options { display: flex; flex-direction: column; gap: 7px; }
.col-filter-check-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); cursor: pointer; }
.col-filter-check-row input { cursor: pointer; accent-color: var(--primary); }
.col-filter-actions { display: flex; gap: 6px; margin-top: 10px; }
.col-filter-clear { flex: 1; padding: 5px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
.col-filter-apply { flex: 1; padding: 5px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit; background: var(--primary); border: 1px solid var(--primary); color: white; font-weight: 600; }

/* ── Filter body scroll ── */
.filter-body { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }

/* ── Column Chooser ── */
.col-chooser-wrap { position: relative; }
.col-chooser-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 14px;
  border: 1.5px solid var(--primary); border-radius: 4px;
  background: white; color: var(--primary);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; white-space: nowrap; transition: background .12s;
}
.col-chooser-btn:hover { background: var(--primary-light); }
.col-chooser-btn i { font-size: 12px; }
.col-chooser-panel {
  position: absolute; top: calc(100% + 6px); right: 0;
  width: 280px; background: white;
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  z-index: 500; display: none; overflow: hidden;
}
.col-chooser-panel.open { display: block; }
.col-chooser-hd {
  padding: 10px 14px 9px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.col-chooser-hd-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
.col-chooser-search {
  display: block; width: calc(100% - 24px); margin: 10px 12px 0;
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 12px; font-family: inherit; color: var(--text-primary); outline: none;
}
.col-chooser-search:focus { border-color: var(--primary); }
.col-chooser-actions { display: flex; gap: 6px; padding: 6px 14px 4px; }
.col-chooser-act { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 11px; font-family: inherit; padding: 0; }
.col-chooser-act:hover { text-decoration: underline; }
.col-chooser-sep { font-size: 11px; color: var(--border); }
.col-chooser-list { max-height: 280px; overflow-y: auto; padding: 2px 0 8px; }
.col-chooser-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px; cursor: pointer; transition: background .1s;
}
.col-chooser-row:hover { background: var(--bg-hover); }
.col-chooser-row.locked { cursor: default; }
.col-chooser-row.locked:hover { background: transparent; }
.col-chooser-cb { cursor: pointer; accent-color: var(--primary); width: 14px; height: 14px; flex-shrink: 0; }
.col-chooser-lbl { font-size: 12.5px; color: var(--text-primary); flex: 1; user-select: none; }

.col-chooser-lock { font-size: 9px; color: var(--text-muted); }

/* ── Info Tooltips ── */
.info-tip {
  display: inline-flex; align-items: center; justify-content: center;

}
.info-tip:hover { color: var(--primary); }
.global-tooltip {
  position: fixed; z-index: 900; display: none;
  width: 230px; padding: 9px 12px;

  font-size: 11.5px; line-height: 1.5;

}
.global-tooltip::after {
  content: ''; position: absolute; left: 50%; transform: translateX(-50%);
  top: 100%; border: 5px solid transparent; border-top-color: #1e293b;
}
</style>

// ── Location Picker ──
function setLocationPickerOpen(isOpen) {
  state.locationPickerOpen = isOpen;
  document.getElementById('appShell').classList.toggle('location-picker-open', isOpen);
  document.getElementById('locationPickerPanel').classList.toggle('is-open', isOpen);
  document.getElementById('locationChip').setAttribute('aria-expanded', String(isOpen));
  if (isOpen) renderLocationPicker();
}

function getActiveLocationSelection() {
  for (let i = locationLevels.length - 1; i >= 0; i--) {
    const level = locationLevels[i];
    if (state.selectedLocation[level.key]) {
      return { key: level.key, id: state.selectedLocation[level.key] };
    }
  }
  return { key: '', id: '' };
}

function buildLocationLevel(items, levelIndex) {
  const level = locationLevels[levelIndex];
  const active = getActiveLocationSelection();
  return items.map(item => {
    const isActive = active.key === level.key && active.id === item.id;
    const childItems = level.childKey ? (item[level.childKey] || []) : [];
    const hasChildren = childItems.length > 0 && levelIndex < locationLevels.length - 1;
    const isExpanded = state.locationExpandedIds.has(item.id);

    const rowContent = `
      <div class="location-node-row ${isActive ? 'selected' : ''}" style="--location-depth:${levelIndex};">
        ${hasChildren
          ? `<button type="button" class="location-toggle-button" data-location-toggle="${item.id}" aria-expanded="${isExpanded}">
               <i class="fa-solid ${isExpanded ? 'fa-chevron-down' : 'fa-chevron-right'} location-option-chevron" aria-hidden="true"></i>
             </button>`
          : `<span class="location-toggle-spacer" aria-hidden="true"></span>`}
        <button type="button" class="location-option-summary" data-location-level="${level.key}" data-location-id="${item.id}">
          <span class="location-option-copy">
            <strong>${item.text}</strong>
            <span>${level.label}</span>
          </span>
        </button>
        <i class="fa-solid fa-check location-option-check${isActive ? '' : ' is-hidden'}" aria-hidden="true"></i>
      </div>`;

    if (!hasChildren) return `<div class="location-option-leaf">${rowContent}</div>`;

    return `<div class="location-node ${isExpanded ? 'expanded' : ''}">
      ${rowContent}
      <div class="location-children" ${isExpanded ? '' : 'hidden'}>
        ${isExpanded ? buildLocationLevel(childItems, levelIndex + 1) : ''}
      </div>
    </div>`;
  }).join('');
}

function renderLocationPicker() {
  document.getElementById('locationPickerTree').innerHTML = buildLocationLevel(locationTree, 0);
}

function renderBreadcrumb() {
  const lvlMap = { organizationId: locationTree, regionId: null, siteId: null, departmentId: null, teamId: null };
  const sel = state.selectedLocation;

  const org = locationTree.find(o => o.id === sel.organizationId);
  const region = org ? (org.regions || []).find(r => r.id === sel.regionId) : null;
  const site = region ? (region.sites || []).find(s => s.id === sel.siteId) : null;
  const dept = site ? (site.departments || []).find(d => d.id === sel.departmentId) : null;
  const team = dept ? (dept.teams || []).find(t => t.id === sel.teamId) : null;

  const segments = [org, region, site, dept, team].filter(Boolean).map((n, i) => ({
    text: n.text, isLast: false
  }));

  const pageLabel = 'Tasklist Report';
  const trail = document.getElementById('breadcrumbTrail');

  if (segments.length === 0) {
    trail.innerHTML = `<span class="breadcrumb-current">${pageLabel}</span>`;
    return;
  }

  trail.innerHTML = segments.map(s =>
    `<button class="breadcrumb-segment">${s.text}</button>
     <i class="fa-solid fa-chevron-right context-chevron" aria-hidden="true"></i>`
  ).join('') + `<span class="breadcrumb-current">${pageLabel}</span>`;
}

// ── Location Picker Events ──
document.getElementById('locationChip').addEventListener('click', () => {
  setLocationPickerOpen(!state.locationPickerOpen);
});

document.getElementById('locationPickerOverlay').addEventListener('click', () => {
  setLocationPickerOpen(false);
});

document.getElementById('locationPickerTree').addEventListener('click', e => {
  const toggleBtn = e.target.closest('[data-location-toggle]');
  if (toggleBtn) {
    const id = toggleBtn.dataset.locationToggle;
    if (state.locationExpandedIds.has(id)) state.locationExpandedIds.delete(id);
    else state.locationExpandedIds.add(id);
    renderLocationPicker();
    return;
  }
  const optionBtn = e.target.closest('[data-location-level]');
  if (optionBtn) {
    const lvlKey = optionBtn.dataset.locationLevel;
    const id = optionBtn.dataset.locationId;
    const lvlIdx = locationLevels.findIndex(l => l.key === lvlKey);
    // Clear deeper levels
    for (let i = lvlIdx; i < locationLevels.length; i++) {
      state.selectedLocation[locationLevels[i].key] = '';
    }
    state.selectedLocation[lvlKey] = id;
    renderLocationPicker();
    renderBreadcrumb();
  }
});

document.addEventListener('click', e => {
  if (!state.locationPickerOpen) return;
  const path = e.composedPath();
  if (!path.includes(document.getElementById('locationPickerPanel')) &&
      !path.includes(document.getElementById('locationChip')) &&
      !path.includes(document.getElementById('locationPickerOverlay'))) {
    setLocationPickerOpen(false);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.locationPickerOpen) {
    setLocationPickerOpen(false);
    document.getElementById('locationChip').focus();
  }
});

function getFilteredData() {
  let data = DATA;
  if (columnFilters.tasklist) data = data.filter(r => r.tasklist.toLowerCase().includes(columnFilters.tasklist.toLowerCase()));
  if (columnFilters.employee) data = data.filter(r => r.employee.toLowerCase().includes(columnFilters.employee.toLowerCase()));
  if (columnFilters.location) data = data.filter(r => r.location.toLowerCase().includes(columnFilters.location.toLowerCase()));
  if (columnFilters.status.length > 0) data = data.filter(r => columnFilters.status.includes(r.status));
  if (columnFilters.completedDate) data = data.filter(r => (r.completedDate || '—').toLowerCase().includes(columnFilters.completedDate.toLowerCase()));
  if (columnFilters.timeSpent) data = data.filter(r => r.timeSpent.toLowerCase().includes(columnFilters.timeSpent.toLowerCase()));
  if (columnFilters.tasksRequired) data = data.filter(r => `${r.tasksRequired} of ${r.totalTasks}`.includes(columnFilters.tasksRequired));
  if (columnFilters.assignmentDate) data = data.filter(r => (r.assignedDate || '—').toLowerCase().includes(columnFilters.assignmentDate.toLowerCase()));
  if (columnFilters.tasklistCreated) data = data.filter(r => (r.createdOn || '—').toLowerCase().includes(columnFilters.tasklistCreated.toLowerCase()));
  if (columnFilters.assigned.length > 0) data = data.filter(r => columnFilters.assigned.includes(r.assignedStatus));
  if (showOnlyLastAssigned) {
    const latest = {};
    DATA.forEach(r => {
      if (!r.assignedDate || r.assignedDate === '—') return;
      const d = new Date(r.assignedDate);
      if (!latest[r.employee] || d > new Date(latest[r.employee])) latest[r.employee] = r.assignedDate;
    });
    data = data.filter(r => r.assignedDate && latest[r.employee] === r.assignedDate);
  }
  return data;
}

function toggleLastAssigned(checked) {
  showOnlyLastAssigned = checked;
  currentPage = 1;
  renderGrid();
}

const CHOOSER_COLS = GRID_COLS.filter(c => c.key !== '_expand');

function toggleColChooser() {
  const panel = document.getElementById('colChooserPanel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen) {
    document.getElementById('colChooserSearch').value = '';
    renderColChooserList('');
    document.addEventListener('click', _colChooserOutside, true);
  } else {
    document.removeEventListener('click', _colChooserOutside, true);
  }
}
function closeColChooser() {
  document.getElementById('colChooserPanel').classList.remove('open');
  document.removeEventListener('click', _colChooserOutside, true);
}
function _colChooserOutside(e) {
  if (!document.getElementById('colChooserWrap').contains(e.target)) closeColChooser();
}
function renderColChooserList(query) {
  const q = (query || '').toLowerCase();
  const list = document.getElementById('colChooserList');
  list.innerHTML = CHOOSER_COLS
    .filter(c => c.label.toLowerCase().includes(q))
    .map(col => {
      if (col.locked) {
        return `<div class="col-chooser-row locked">
          <input type="checkbox" class="col-chooser-cb" checked disabled>
          <span class="col-chooser-lbl">${col.label}</span>
          <span class="col-chooser-lock"><i class="fa-solid fa-lock"></i></span>
        </div>`;
      }
      const visible = !hiddenCols.has(col.key);
      return `<div class="col-chooser-row" onclick="toggleCol('${col.key}')">
        <input type="checkbox" class="col-chooser-cb" ${visible ? 'checked' : ''} onclick="event.stopPropagation();toggleCol('${col.key}')">
        <span class="col-chooser-lbl">${col.label}</span>
      </div>`;
    }).join('');
}
function toggleCol(key) {
  if (hiddenCols.has(key)) hiddenCols.delete(key); else hiddenCols.add(key);
  renderColChooserList(document.getElementById('colChooserSearch').value);
  renderGrid();
}
function selectAllCols() {
  hiddenCols.clear();
  renderColChooserList(document.getElementById('colChooserSearch').value);
  renderGrid();
}
function clearAllCols() {
  GRID_COLS.filter(c => !c.locked && c.key !== '_expand').forEach(c => hiddenCols.add(c.key));

  renderGrid();
}

// ── Helpers ──
function badge(status) {
  const m = {Passed:'badge-passed',Incomplete:'badge-incomplete','Not Started':'badge-not-started'};
  return `<span class="badge ${m[status]||'badge-not-started'}">${status}</span>`;
}
function progressBar(pct) {
  return `<div class="progress-wrap"><div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-pct">${pct}%</span></div>`;
}
function signoff(s) {
  if (!s) return `<span class="signoff-none">—</span>`;
  const list = Array.isArray(s) ? s : [s];
  const primary = list[0];
  const overflow = list.slice(1);
  if (overflow.length === 0) {
    return `<span class="signoff-name">${primary.by}</span><span class="signoff-date">${primary.date}</span>`;
  }
  const encoded = encodeURIComponent(JSON.stringify(overflow));
  return `<div class="signoff-name-row"><span class="signoff-name">${primary.by}</span><button class="signoff-overflow-chip" data-overflow="${encoded}" onclick="toggleSignoffPopover(this)">+${overflow.length}</button></div><span class="signoff-date">${primary.date}</span>`;
}
function renderDetail(row) {
  const taskRows = row.tasks.map(t => `<tr>
    <td class="task-num-cell">${t.num}</td>
    <td class="task-desc-cell">${t.desc}${t.req ? '<span class="badge-required">REQUIRED</span>' : ''}</td>
    <td class="signoff-cell">${signoff(t.instr)}</td>
    <td class="signoff-cell">${signoff(t.emp)}</td>
    <td class="comment-cell">${t.comment || '<span style="color:var(--text-muted)">—</span>'}</td>
  </tr>`).join('');

  const instrMap = new Map();
  row.tasks.forEach(t => {
    if (!t.instr) return;
    const list = Array.isArray(t.instr) ? t.instr : [t.instr];
    list.forEach(i => { if (!instrMap.has(i.by)) instrMap.set(i.by, i); });
  });
  const instructors = [...instrMap.values()];
  const empSignoff = row.tasks.find(t => t.emp)?.emp;
  const allSigners = [
    ...instructors.map(i => ({ ...i, role: 'Instructor' })),
    ...(empSignoff ? [{ ...empSignoff, role: 'Employee' }] : [])
  ];
  const sigSection = allSigners.length === 0 ? '' : `<div class="sig-section">
    <div class="sig-section-header">Signatures</div>
    <div class="sig-cards-inline">${allSigners.map(s => `
      <div class="sig-card">
        <div class="sig-image-area">${sigSVG(s.by)}</div>
        <div class="sig-card-info">
          <div class="sig-card-name">${s.by}</div>
          <div class="sig-card-role ${s.role === 'Instructor' ? 'sig-role-instructor' : 'sig-role-employee'}">${s.role}</div>
          <div class="sig-card-date">${s.date}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;

  return `<div class="detail-inner">
    <table class="detail-grid">
      <thead><tr><th class="task-num-cell">#</th><th>Task Description</th><th>Instructor Sign-off</th><th>Employee Sign-off</th><th>Comment</th></tr></thead>
      <tbody>${taskRows}</tbody>
    </table>
    ${sigSection}
  </div>`;
}

// ── Build thead with column filter buttons ──
function buildThead() {
  const vis = GRID_COLS.filter(c => c.locked || !hiddenCols.has(c.key));
  return '<tr>' + vis.map(col => {
    if (col.key === '_expand') return `<th style="width:32px;"></th>`;
    if (!col.filterKey) return `<th style="min-width:${col.minWidth}px;">${col.label}</th>`;
    const cur = columnFilters[col.filterKey];
    const isActive = Array.isArray(cur) ? cur.length > 0 : cur !== '';
    return `<th style="min-width:${col.minWidth}px;">
      <div class="th-inner">
        <span class="th-label">${col.sortable ? `${col.label} <i class="fa-solid fa-arrow-up" style="font-size:9px;opacity:.5;"></i>` : col.label}</span>
        <button class="col-filter-btn${isActive ? ' active' : ''}" data-col="${col.filterKey}" onclick="openColFilter(event,'${col.filterKey}')"><i class="fa-solid fa-filter"></i></button>
      </div>
    </th>`;
  }).join('') + '</tr>';
}

function buildCell(col, row) {
  switch (col.key) {
    case '_expand':        return `<td><button class="expand-btn" id="btn-${row.id}" onclick="event.stopPropagation();toggleRow(${row.id},this.closest('tr'))"><i class="fa-solid fa-chevron-right"></i></button></td>`;
    case 'tasklist':       return `<td><div class="tasklist-name">${row.tasklist}</div><div class="tasklist-version">Version ${row.version}</div></td>`;
    case 'employee':       return `<td>${row.employee}</td>`;
    case 'location':       return `<td><div class="location-text">${row.location}</div></td>`;
    case 'status':         return `<td>${badge(row.status)}</td>`;
    case 'pct':            return `<td>${progressBar(row.pct)}</td>`;
    case 'completedDate':  return `<td style="color:var(--text-secondary)">${row.completedDate || '—'}</td>`;
    case 'timeSpent':      return `<td>${row.timeSpent}</td>`;
    case 'checkoffType':   return `<td>Instructor AND Employee</td>`;
    case 'tasksRequired':  return `<td>${row.tasksRequired} of ${row.totalTasks}</td>`;
    case 'assignmentDate': return `<td>${row.assignedDate || '—'}</td>`;
    case 'tasklistCreated':return `<td>${row.createdOn || '—'}</td>`;
    case 'assigned':       return `<td><span class="badge badge-assigned">${row.assignedStatus}</span></td>`;
    default:               return '<td></td>';
  }
}

// ── Render Grid ──
function renderGrid() {
  const allRows = getFilteredData();
  const totalRows = allRows.length;
  const totalPages = Math.ceil(totalRows / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const rows = allRows.slice(start, start + PAGE_SIZE);
  const thead = document.getElementById('grid-thead');
  const tbody = document.getElementById('grid-tbody');

  thead.innerHTML = buildThead();

  const visCols = GRID_COLS.filter(c => c.locked || !hiddenCols.has(c.key));
  tbody.innerHTML = rows.map(row => {
    return `
      <tr class="master-row" onclick="toggleRow(${row.id},this)">
        ${visCols.map(col => buildCell(col, row)).join('')}
      </tr>
      <tr class="detail-row" id="detail-${row.id}">
        <td colspan="${visCols.length}" class="detail-cell">${renderDetail(row)}</td>
      </tr>`;
  }).join('');

  // Pagination
  const pagEl = document.getElementById('grid-pagination');
  if (!pagEl) return;
  if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
  const from = start + 1, to = Math.min(start + PAGE_SIZE, totalRows);
  let pageNums = '';
  for (let i = 1; i <= totalPages; i++) {
    pageNums += `<button class="pag-num ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }
  pagEl.innerHTML = `
    <span class="pag-info">Showing ${from}–${to} of ${totalRows} records</span>
    <div class="pag-controls">
      <button class="pag-nav" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
        <i class="fa-solid fa-chevron-left" style="font-size:10px;"></i>
      </button>
      ${pageNums}
      <button class="pag-nav" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
        <i class="fa-solid fa-chevron-right" style="font-size:10px;"></i>
      </button>
    </div>`;
  requestAnimationFrame(updateMasterRowTop);
}

function goToPage(page) { currentPage = page; renderGrid(); }

function updateMasterRowTop() {
  const thead = document.getElementById('grid-thead');
  const wrap = document.querySelector('.grid-scroll-wrap');
  if (!thead || !wrap) return;
  wrap.style.setProperty('--master-row-top', Math.ceil(thead.getBoundingClientRect().height) + 'px');
}

// ── Toggle row ──
function toggleRow(id, masterTr) {
  const detail = document.getElementById('detail-'+id);
  const btn = document.getElementById('btn-'+id);
  const isOpen = detail.classList.contains('open');
  document.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('.master-row.expanded').forEach(r => r.classList.remove('expanded'));
  document.querySelectorAll('.expand-btn.open').forEach(b => b.classList.remove('open'));
  if (!isOpen) { detail.classList.add('open'); masterTr.classList.add('expanded'); btn.classList.add('open'); }
}

// ── Column Filter Popover ──
let _activeColKey = null;

function openColFilter(event, colKey) {
  event.stopPropagation();
  const pop = document.getElementById('colFilterPopover');
  if (_activeColKey === colKey && pop.classList.contains('open')) { closeColFilter(); return; }
  closeColFilter();
  _activeColKey = colKey;
  const config = COL_CONFIGS[colKey];
  document.getElementById('colFilterTitle').textContent = config.label;
  const body = document.getElementById('colFilterBody');
  const cur = columnFilters[colKey];
  if (config.type === 'text') {
    body.innerHTML = `<input type="text" class="col-filter-input" id="colFilterInput" placeholder="Filter ${config.label.toLowerCase()}..." value="${cur || ''}" onkeydown="if(event.key==='Enter')applyActiveColFilter()">`;
  } else {
    body.innerHTML = `<div class="col-filter-check-options">${config.options.map(o =>
      `<label class="col-filter-check-row"><input type="checkbox" value="${o}" ${(cur || []).includes(o) ? 'checked' : ''}> ${o}</label>`
    ).join('')}</div>`;
  }
  const btn = event.currentTarget;
  const r = btn.getBoundingClientRect();
  pop.style.top = (r.bottom + 4) + 'px';
  pop.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 228)) + 'px';
  pop.classList.add('open');
  if (config.type === 'text') setTimeout(() => { const inp = document.getElementById('colFilterInput'); if (inp) { inp.focus(); inp.select(); } }, 10);
}

function closeColFilter() {
  document.getElementById('colFilterPopover').classList.remove('open');
  _activeColKey = null;
}

function clearActiveColFilter() {
  if (!_activeColKey) return;
  columnFilters[_activeColKey] = COL_CONFIGS[_activeColKey].type === 'check' ? [] : '';
  closeColFilter();
  currentPage = 1;
  renderGrid();
}

function applyActiveColFilter() {
  if (!_activeColKey) return;
  if (COL_CONFIGS[_activeColKey].type === 'text') {
    const inp = document.getElementById('colFilterInput');
    columnFilters[_activeColKey] = inp ? inp.value.trim() : '';
  } else {
    columnFilters[_activeColKey] = [...document.querySelectorAll('#colFilterBody input[type="checkbox"]:checked')].map(cb => cb.value);
  }
  closeColFilter();
  currentPage = 1;
  renderGrid();
}

document.addEventListener('click', e => {
  if (_activeColKey && !e.target.closest('#colFilterPopover') && !e.target.closest('.col-filter-btn')) closeColFilter();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape' && _activeColKey) closeColFilter(); });

let _activeChip = null;

function toggleSignoffPopover(chip) {
  const pop = document.getElementById('signoffPopover');
  if (_activeChip === chip && pop.classList.contains('open')) {
    closeSignoffPopover(); return;
  }
  closeSignoffPopover();
  const overflow = JSON.parse(decodeURIComponent(chip.dataset.overflow));
  pop.innerHTML = `<div class="signoff-popover-header">Additional Sign-offs</div>` +
    overflow.map(s => `<div class="signoff-popover-item"><div class="signoff-popover-name">${s.by}</div><div class="signoff-popover-date">${s.date}</div></div>`).join('');
  const r = chip.getBoundingClientRect();
  pop.style.top = (r.bottom + 6) + 'px';
  const left = Math.min(r.left, window.innerWidth - 300);
  pop.style.left = Math.max(8, left) + 'px';
  pop.classList.add('open');
  chip.classList.add('active');
  _activeChip = chip;
}
function closeSignoffPopover() {
  const pop = document.getElementById('signoffPopover');
  pop.classList.remove('open');
  if (_activeChip) { _activeChip.classList.remove('active'); _activeChip = null; }
}
document.addEventListener('click', e => {
  if (_activeChip && !e.target.closest('.signoff-overflow-chip') && !e.target.closest('#signoffPopover')) closeSignoffPopover();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape' && _activeChip) closeSignoffPopover(); });

// ── Panel toggles ──
function toggleFilterPanel() {
  const panel = document.getElementById('filterPanel');
  const revealBtn = document.querySelector('.filter-reveal-btn');
  const isCollapsing = !panel.classList.contains('collapsed');
  panel.classList.toggle('collapsed');
  revealBtn.style.display = isCollapsing ? 'flex' : 'none';
}

// ── Topnav logo + sidenav setup ──
window.addEventListener('load', () => {
  const topnav = document.getElementById('topnav');
  if (topnav && typeof topnav.logo !== 'undefined') {
    topnav.logo = { src: 'assets/Vector Solutions logo.svg', alt: 'Vector Solutions' };
  }

  const sideNav = document.getElementById('sideNav');
  sideNav.items = [
    {
      id: 'ACTIVITY_REPORTS', type: 'group', text: 'Activity Reports',
      icon: { type: 'slotted', name: 'icon-activity-reports' },
      children: [
        { id: 'AER', type: 'button', text: 'Activity Exception Report' },
        { id: 'TASKLIST', type: 'button', text: 'Tasklist Report' }
      ]
    },
    {
      id: 'QUAL_REPORTS', type: 'group', text: 'Qualification Reports',
      icon: { type: 'slotted', name: 'icon-qual-reports' },
      children: [
        { id: 'QUAL_COMPLETION', type: 'button', text: 'Qualification Completion Report' },
        { id: 'QUAL_TRAINING', type: 'button', text: 'Qualification Training Details Report' }
      ]
    }
  ];
  sideNav.expandedGroupIds = ['ACTIVITY_REPORTS', 'QUAL_REPORTS'];
  sideNav.activeItemId = 'TASKLIST';
  sideNav.addEventListener('item-click', e => {
    if (e.detail.id === 'AER') alert('Navigate to Activity Exception Report');
  });

  // Set initial expanded width, then toggle via MutationObserver.
  // Inline style wins over both our CSS and shadow DOM host CSS, so:
  //   expanded  → inline 250px (shadow reflows to fill host)
  //   collapsed → no inline style (component's shadow CSS controls width, shrinks to icon strip)
  sideNav.style.width = '250px';
  new MutationObserver(() => {
    sideNav.style.width = sideNav.hasAttribute('collapsed') ? '' : '250px';
  }).observe(sideNav, { attributes: true, attributeFilter: ['collapsed'] });

  // Override the shadow container's hardcoded 300px so it fills the host width.
  const shadowStyle = document.createElement('style');
  shadowStyle.textContent = '.vwc-sidenav { width: 100% !important; min-width: 0 !important; } nav.vwc-sidenav--list { width: 100% !important; min-width: 0 !important; }';
  sideNav.shadowRoot.appendChild(shadowStyle);
  updateMasterRowTop();
});
window.addEventListener('resize', updateMasterRowTop);

// ── Init ──
document.getElementById('activities-list').innerHTML = ACTIVITIES.map(a => `<label class="modal-item"><input type="checkbox"> ${a}</label>`).join('');
document.getElementById('users-list').innerHTML = USERS.map(u => `<label class="modal-item"><input type="checkbox"> ${u}</label>`).join('');
renderGrid();
renderBreadcrumb();
</script>
<div id="globalTooltip" class="global-tooltip"></div>
</body>
